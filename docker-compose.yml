
services:
  postgres:
    image: postgres:15
    container_name: myapp_postgres
    restart: always
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mongo:
    image: mongo:6
    container_name: myapp_mongo
    restart: always
    environment:
      MONGO_INITDB_DATABASE: myapp_mongo
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: myapp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: myapp_backend
    command: ["./entrypoint.sh"]
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo
      - redis

  frontend:
    image: node:20-alpine
    container_name: myapp_frontend
    working_dir: /app
    environment:
      - HOSTNAME=0.0.0.0
      - WATCHPACK_POLLING=true      # enables HMR file watching on Windows/WSL2
      - CHOKIDAR_USEPOLLING=true    # fallback polling for older watchers
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  redis_data:
